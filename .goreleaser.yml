# GoReleaser configuration for remembrances-mcp
# Supports two build modes:
# 1. Standard build (CGO_ENABLED=0) - Remote SurrealDB only
# 2. Embedded build (CGO_ENABLED=1) - With embedded SurrealDB support
version: 2

before:
  hooks:
    # Build Rust library for embedded support before building Go binaries
    - bash -c 'if [ -d "surrealdb_embedded_rs" ]; then cd surrealdb_embedded_rs && cargo build --release; fi'

builds:
  # Standard build without CGO - Remote SurrealDB only
  - id: remembrances-mcp-remote
    main: ./cmd/remembrances-mcp
    binary: remembrances-mcp
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - "amd64"
      - "arm64"
    ldflags:
      - "-s"
      - "-w"
      - "-X github.com/madeindigio/remembrances-mcp/pkg/version.CommitHash={{.Commit}}"
      - "-X github.com/madeindigio/remembrances-mcp/pkg/version.Version={{.Version}}"
    env:
      - CGO_ENABLED=0
    ignore:
      - goos: windows
        goarch: "arm64"

  # Embedded build with CGO - Requires native toolchain or Docker
  - id: remembrances-mcp-embedded
    main: ./cmd/remembrances-mcp
    binary: remembrances-mcp-embedded
    goos:
      - linux
      - darwin
    goarch:
      - "amd64"
      - "arm64"
    tags:
      - embedded
    ldflags:
      - "-s"
      - "-w"
      - "-X github.com/madeindigio/remembrances-mcp/pkg/version.CommitHash={{.Commit}}"
      - "-X github.com/madeindigio/remembrances-mcp/pkg/version.Version={{.Version}}"
      - "-linkmode external"
      - "-extldflags=-static"
    env:
      - CGO_ENABLED=1
    # Cross-compilation setup for CGO
    # For Linux x64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CC=x86_64-linux-gnu-gcc
          - CXX=x86_64-linux-gnu-g++
      # For Linux ARM64
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++
      # For macOS x64
      - goos: darwin
        goarch: amd64
        env:
          - CC=o64-clang
          - CXX=o64-clang++
      # For macOS ARM64
      - goos: darwin
        goarch: arm64
        env:
          - CC=oa64-clang
          - CXX=oa64-clang++

dist: ./dist/outputs/dist

upx:
  - enabled: true
    # Compress remote builds only (embedded builds are already large due to static linking)
    ids:
      - remembrances-mcp-remote
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    compress: '1'
    lzma: true
    brute: false

archives:
  # Remote builds
  - id: remote-binary
    builds:
      - remembrances-mcp-remote
    formats: ['binary']
  - id: remote-tar
    builds:
      - remembrances-mcp-remote
    formats: ['tar.gz']
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
  # Embedded builds
  - id: embedded-binary
    builds:
      - remembrances-mcp-embedded
    formats: ['binary']
  - id: embedded-tar
    builds:
      - remembrances-mcp-embedded
    formats: ['tar.gz']
    name_template: >-
      {{ .ProjectName }}_embedded_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^build:'
